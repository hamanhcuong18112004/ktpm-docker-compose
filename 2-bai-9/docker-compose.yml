services:
    db:
        image: mariadb:10.11
        restart: always
        environment:
            MYSQL_ROOT_PASSWORD: rootpassword
            MYSQL_DATABASE: nextcloud
            MYSQL_USER: nextcloud
            MYSQL_PASSWORD: nextcloudpass
        volumes:
            - db_data:/var/lib/mysql

    redis:
        image: redis:7-alpine
        restart: always

    app:
        image: nextcloud:latest
        restart: always
        depends_on:
            - db
            - redis
        ports:
            - "8089:80"
        environment:
            MYSQL_DATABASE: nextcloud
            MYSQL_USER: nextcloud
            MYSQL_PASSWORD: nextcloudpass
            MYSQL_HOST: db
            REDIS_HOST: redis
        volumes:
            - nextcloud_data:/var/www/html

volumes:
    db_data:
    nextcloud_data:
