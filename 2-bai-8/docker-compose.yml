services:
    web:
        build: .
        command: sh -c "python manage.py migrate && python manage.py runserver 0.0.0.0:8000"
        volumes:
            - .:/app
        ports:
            - "8000:8000"
        depends_on:
            redis:
                condition: service_healthy

    worker:
        build: .
        command: celery -A core worker --loglevel=info
        volumes:
            - .:/app
        depends_on:
            redis:
                condition: service_healthy

    redis:
        image: redis:7-alpine
        healthcheck:
            test: ["CMD", "redis-cli", "ping"]
            interval: 10s
            timeout: 5s
            retries: 5
